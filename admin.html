<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Date avec mon amour ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #f2a7b8;
    --rose-deep: #d4688a;
    --rose-light: #fce8ef;
    --rose-pale: #fff5f8;
    --blush: #f7d6e0;
    --cream: #fdf8f5;
    --text: #3d2535;
    --text-soft: #8a6070;
    --text-muted: #c4a8b4;
    --white: #ffffff;
    --shadow: rgba(180, 100, 130, 0.12);
    --green: #5aac6e;
    --green-light: #edf7f0;
    --red: #c45050;
    --red-light: #fdeaea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fce8ef 0%, #f7d6e0 100%);
    padding: 2rem;
  }
  .login-box {
    background: white;
    border-radius: 24px;
    padding: 3rem;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 25px 50px rgba(212, 104, 138, 0.15);
    text-align: center;
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, #d4688a, #f2a7b8);
  }
  .login-emoji { font-size: 3rem; margin-bottom: 1.5rem; display: block; }
  .login-box h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 400; margin-bottom: 0.5rem; color: var(--text); }
  .login-box h1 span { color: var(--rose-deep); font-style: italic; }
  .login-box p { font-size: 0.95rem; color: var(--text-soft); margin-bottom: 2rem; }

  .login-input-group { margin-bottom: 1.5rem; text-align: left; }
  .login-input-group label { display: block; font-size: 0.85rem; color: var(--text-soft); margin-bottom: 0.5rem; font-weight: 500; }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 0.9rem 1rem; border: 1.5px solid var(--blush); border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; background: var(--rose-pale);
    outline: none;
  }
  input:focus { border-color: var(--rose-deep); background: white; }

  .btn-primary {
    width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--rose-deep), #c45580);
    color: white; border: none; border-radius: 12px; font-size: 1rem;
    font-weight: 500; cursor: pointer; transition: all 0.3s;
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.75rem; padding: 0.5rem; background: rgba(196, 80, 80, 0.1); border-radius: 8px; display: none; }

  /* ADMIN */
  #adminScreen { display: none; }
  .admin-header {
    background: white; border-bottom: 1px solid var(--blush); padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .admin-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; }
  .admin-header h1 span { color: var(--rose-deep); }
  .logout-btn { background: transparent; border: 1px solid var(--blush); padding: 0.4rem 0.9rem; border-radius: 8px; cursor: pointer; }
  .admin-body { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: white; border-radius: 16px; padding: 1.25rem; text-align: center; box-shadow: 0 2px 12px var(--shadow); }
  .stat-num { font-size: 2rem; color: var(--rose-deep); }
  .stat-label { font-size: 0.8rem; color: var(--text-muted); }

  .section-title { font-size: 1.5rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--blush); }
  .request-card {
    background: white; border-radius: 16px; padding: 1.25rem; margin-bottom: 0.75rem;
    display: flex; align-items: flex-start; gap: 1rem; box-shadow: 0 2px 12px var(--shadow);
  }
  .req-body { flex: 1; }
  .req-title { font-weight: 500; }
  .req-meta { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.25rem; }
  .req-note { background: var(--rose-pale); padding: 0.5rem; border-radius: 8px; font-size: 0.85rem; margin-top: 0.5rem; }
  .req-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

  .btn-sm { padding: 0.4rem 0.9rem; border-radius: 8px; cursor: pointer; border: none; }
  .btn-accept { background: var(--green-light); color: var(--green); }
  .btn-decline { background: var(--red-light); color: var(--red); }

  .badge { display: inline-block; padding: 0.2rem 0.65rem; border-radius: 20px; font-size: 0.75rem; }
  .badge-pending { background: #fff8e1; color: #b08000; }
  .badge-accepted { background: var(--green-light); color: var(--green); }
  .badge-declined { background: var(--red-light); color: var(--red); }

  .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); }

  /* CHAT ADMIN */
  .admin-chat-wrap { background: white; border-radius: 16px; overflow: hidden; margin-bottom: 2rem; }
  .chat-messages { height: 300px; overflow-y: auto; padding: 1rem; background: var(--cream); }
  .msg-row { display: flex; align-items: flex-end; gap: 0.5rem; margin-bottom: 0.75rem; }
  .msg-row.me { flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--rose); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
  .msg-row.me .msg-avatar { background: #7ab8f5; }
  .msg-bubble { padding: 0.5rem 1rem; border-radius: 18px; max-width: 70%; }
  .msg-row.lui .msg-bubble { background: white; border: 1px solid var(--blush); }
  .msg-row.me .msg-bubble { background: var(--rose-deep); color: white; }
  .msg-time { font-size: 0.68rem; color: var(--text-muted); margin-top: 0.2rem; display: block; }
  .chat-date-sep { text-align: center; font-size: 0.7rem; color: var(--text-muted); margin: 0.5rem 0; }

  .admin-chat-composer { display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid var(--blush); background: white; }
  .admin-chat-textarea { flex: 1; border: 1px solid var(--blush); border-radius: 20px; padding: 0.6rem 1rem; resize: none; font-family: inherit; }
  .admin-chat-send { width: 38px; height: 38px; border-radius: 50%; background: var(--rose-deep); color: white; border: none; cursor: pointer; }

  /* FEEDBACK */
  .feedback-card { background: white; border-radius: 14px; padding: 1rem; margin-bottom: 0.75rem; }
  .feedback-card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
  .feedback-mood-emoji { font-size: 1.5rem; }
  .feedback-text { background: var(--rose-pale); padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--text); color: white; padding: 0.75rem 1.5rem; border-radius: 40px;
    transition: transform 0.3s; z-index: 1000;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-emoji">🔐</div>
    <h1>Espace <span>Admin</span></h1>
    <p>Accès réservé pour gérer nos moments spéciaux</p>
    <div class="login-input-group">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="ton@email.com">
    </div>
    <div class="login-input-group">
      <label>Mot de passe</label>
      <input type="password" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn-primary" onclick="login()">Se connecter ❤️</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="adminScreen">
  <div class="admin-header">
    <h1>Admin — <span>mes propositions</span> 💌</h1>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>
  <div class="admin-body">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statMeals">0</div><div class="stat-label">Repas</div></div>
      <div class="stat-card"><div class="stat-num" id="statPlanning">0</div><div class="stat-label">Câlins</div></div>
      <div class="stat-card"><div class="stat-num" id="statActivities">0</div><div class="stat-label">Activités</div></div>
      <div class="stat-card"><div class="stat-num" id="statPending">0</div><div class="stat-label">En attente</div></div>
    </div>

    <div class="section-title">🍽️ Propositions repas</div>
    <div id="mealList"><div class="empty-state">Chargement...</div></div>

    <div class="section-title" style="margin-top: 1.5rem;">💕 Moments câlins</div>
    <div id="planningList"><div class="empty-state">Chargement...</div></div>

    <div class="section-title" style="margin-top: 1.5rem;">✨ Idées d'activités</div>
    <div id="activityList"><div class="empty-state">Chargement...</div></div>

    <div class="section-title" style="margin-top: 1.5rem;">💬 Chat</div>
    <div class="admin-chat-wrap">
      <div class="chat-messages" id="adminChatMessages"><div class="empty-state">💕 Chargement...</div></div>
      <div class="admin-chat-composer">
        <textarea id="adminChatInput" class="admin-chat-textarea" placeholder="Écris un message... 🌹" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();adminSendMessage()}"></textarea>
        <button class="admin-chat-send" onclick="adminSendMessage()">➤</button>
      </div>
    </div>

    <div class="section-title">💬 Feedbacks</div>
    <div id="feedbackList"><div class="empty-state">Chargement...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyB-GZDMMGGCsoxAgVHBuWG0Z9UGsVVx4x8",
    authDomain: "date-schedule-app.firebaseapp.com",
    projectId: "date-schedule-app",
    storageBucket: "date-schedule-app.firebasestorage.app",
    messagingSenderId: "340648368652",
    appId: "1:340648368652:web:e96efe6100d45a39846c29"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  window.db = db;
  window.auth = auth;

  onAuthStateChanged(auth, (user) => {
    console.log("Auth state changed:", user ? "Connecté" : "Déconnecté");
    if (user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadAllData();
      loadChat();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('adminScreen').style.display = 'none';
    }
  });
</script>

<script>
  // Variables globales
  let currentRequests = { meals: [], planning: [], activities: [] };

  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show ' + (type || '');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function formatDateFr(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ========== AUTH ==========
  async function login() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errDiv = document.getElementById('loginError');
    
    if (!email || !password) {
      errDiv.textContent = 'Email et mot de passe requis';
      errDiv.style.display = 'block';
      return;
    }
    
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      errDiv.textContent = e.code === 'auth/invalid-credential' ? 'Email ou mot de passe incorrect' : 'Erreur de connexion';
      errDiv.style.display = 'block';
    }
  }

  async function logout() {
    await signOut(auth);
  }

  // ========== CHARGEMENT DES DONNÉES ==========
  async function loadAllData() {
    if (!window.db) {
      loadDemoData();
      return;
    }
    
    try {
      const mealsSnap = await getDocs(query(collection(db, 'mealRequests'), orderBy('createdAt', 'desc')));
      currentRequests.meals = mealsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      const planningSnap = await getDocs(query(collection(db, 'planningRequests'), orderBy('createdAt', 'desc')));
      currentRequests.planning = planningSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      const activitiesSnap = await getDocs(query(collection(db, 'activityRequests'), orderBy('createdAt', 'desc')));
      currentRequests.activities = activitiesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      renderAll();
    } catch(e) {
      console.error("Erreur chargement:", e);
      showToast('Erreur de chargement des données', 'error');
    }
  }

  function loadDemoData() {
    currentRequests = {
      meals: [{ id: '1', food: 'Sushi', date: '2025-02-15', slot: 'soir', note: 'J\'ai envie de sushis', status: 'pending', createdAt: new Date().toISOString() }],
      planning: [{ id: '2', date: '2025-02-16', comment: 'Mode doux', status: 'pending', createdAt: new Date().toISOString() }],
      activities: [{ id: '3', activity: 'Bain moussant', note: 'J\'adorerais', status: 'pending', createdAt: new Date().toISOString() }]
    };
    renderAll();
  }

  // ========== AFFICHAGE ==========
  function renderAll() {
    renderMeals();
    renderPlanning();
    renderActivities();
    updateStats();
  }

  function renderMeals() {
    const container = document.getElementById('mealList');
    if (!currentRequests.meals.length) {
      container.innerHTML = '<div class="empty-state">🍽️ Aucune proposition</div>';
      return;
    }
    container.innerHTML = currentRequests.meals.map(r => `
      <div class="request-card">
        <div class="req-body">
          <div class="req-title">${escapeHtml(r.food)} · ${r.slot === 'midi' ? 'Déjeuner' : 'Dîner'}</div>
          <div class="req-meta">${formatDateFr(r.date)} · <span class="badge badge-${r.status}">${r.status === 'pending' ? 'En attente' : r.status === 'accepted' ? 'Accepté' : 'Refusé'}</span></div>
          ${r.note ? `<div class="req-note">"${escapeHtml(r.note)}"</div>` : ''}
          <div class="req-actions">
            ${r.status === 'pending' ? `
              <button class="btn-sm btn-accept" onclick="updateRequest('mealRequests', '${r.id}', 'accepted')">✅ Accepter</button>
              <button class="btn-sm btn-decline" onclick="updateRequest('mealRequests', '${r.id}', 'declined')">❌ Refuser</button>
            ` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderPlanning() {
    const container = document.getElementById('planningList');
    if (!currentRequests.planning.length) {
      container.innerHTML = '<div class="empty-state">💕 Aucune demande</div>';
      return;
    }
    container.innerHTML = currentRequests.planning.map(r => `
      <div class="request-card">
        <div class="req-body">
          <div class="req-title">Moment câlins</div>
          <div class="req-meta">${formatDateFr(r.date)} · <span class="badge badge-${r.status}">${r.status === 'pending' ? 'En attente' : r.status === 'accepted' ? 'Accepté' : 'Refusé'}</span></div>
          ${r.comment ? `<div class="req-note">"${escapeHtml(r.comment)}"</div>` : ''}
          <div class="req-actions">
            ${r.status === 'pending' ? `
              <button class="btn-sm btn-accept" onclick="updateRequest('planningRequests', '${r.id}', 'accepted')">✅ Confirmer</button>
              <button class="btn-sm btn-decline" onclick="updateRequest('planningRequests', '${r.id}', 'declined')">❌ Refuser</button>
            ` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderActivities() {
    const container = document.getElementById('activityList');
    if (!currentRequests.activities.length) {
      container.innerHTML = '<div class="empty-state">✨ Aucune idée</div>';
      return;
    }
    container.innerHTML = currentRequests.activities.map(r => `
      <div class="request-card">
        <div class="req-body">
          <div class="req-title">${escapeHtml(r.activity)}</div>
          <div class="req-meta">${r.date ? formatDateFr(r.date) + ' · ' : ''}<span class="badge badge-${r.status}">${r.status === 'pending' ? 'En attente' : r.status === 'accepted' ? 'Accepté' : 'Refusé'}</span></div>
          ${r.note ? `<div class="req-note">"${escapeHtml(r.note)}"</div>` : ''}
          <div class="req-actions">
            ${r.status === 'pending' ? `
              <button class="btn-sm btn-accept" onclick="updateRequest('activityRequests', '${r.id}', 'accepted')">✅ Accepter</button>
              <button class="btn-sm btn-decline" onclick="updateRequest('activityRequests', '${r.id}', 'declined')">❌ Refuser</button>
            ` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function updateStats() {
    const all = [...currentRequests.meals, ...currentRequests.planning, ...currentRequests.activities];
    document.getElementById('statMeals').textContent = currentRequests.meals.length;
    document.getElementById('statPlanning').textContent = currentRequests.planning.length;
    document.getElementById('statActivities').textContent = currentRequests.activities.length;
    document.getElementById('statPending').textContent = all.filter(r => r.status === 'pending').length;
  }

  // ========== MISE À JOUR STATUT ==========
  async function updateRequest(collectionName, id, newStatus) {
    if (!window.db) {
      showToast('Mode démo', 'error');
      return;
    }
    
    try {
      await updateDoc(doc(db, collectionName, id), { status: newStatus });
      
      // Mettre à jour localement
      const collectionKey = collectionName.replace('Requests', '');
      const targetArray = currentRequests[collectionKey === 'meal' ? 'meals' : collectionKey === 'planning' ? 'planning' : 'activities'];
      const item = targetArray.find(r => r.id === id);
      if (item) item.status = newStatus;
      
      renderAll();
      showToast(newStatus === 'accepted' ? '✅ Accepté !' : '❌ Refusé', newStatus === 'accepted' ? 'success' : '');
    } catch(e) {
      console.error(e);
      showToast('Erreur', 'error');
    }
  }

  // ========== CHAT ==========
  async function loadChat() {
    const container = document.getElementById('adminChatMessages');
    if (!window.db) {
      container.innerHTML = '<div class="empty-state">💬 Mode démo</div>';
      return;
    }
    
    try {
      const q = query(collection(db, 'messages'), orderBy('createdAt', 'asc'));
      const snap = await getDocs(q);
      const msgs = snap.docs.map(d => d.data());
      
      if (!msgs.length) {
        container.innerHTML = '<div class="empty-state">💬 Aucun message</div>';
        return;
      }
      
      let html = '';
      let lastDate = '';
      msgs.forEach(m => {
        const isMe = m.sender === 'me';
        const d = new Date(m.createdAt);
        const dateKey = d.toDateString();
        if (dateKey !== lastDate) {
          html += `<div class="chat-date-sep">${d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' })}</div>`;
          lastDate = dateKey;
        }
        const time = d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        html += `
          <div class="msg-row ${isMe ? 'me' : 'lui'}">
            <div class="msg-avatar">${isMe ? '👨' : '👩'}</div>
            <div class="msg-group">
              <div class="msg-bubble">${escapeHtml(m.text)}<span class="msg-time">${time}</span></div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    } catch(e) {
      console.error(e);
      container.innerHTML = '<div class="empty-state">😔 Erreur chargement</div>';
    }
  }

  async function adminSendMessage() {
    const input = document.getElementById('adminChatInput');
    const text = input.value.trim();
    if (!text) return;
    
    input.value = '';
    if (!window.db) {
      showToast('Mode démo', 'error');
      return;
    }
    
    try {
      await addDoc(collection(db, 'messages'), {
        sender: 'me',
        text: text,
        createdAt: new Date().toISOString()
      });
      await loadChat();
      showToast('Message envoyé', 'success');
    } catch(e) {
      showToast('Erreur', 'error');
      input.value = text;
    }
  }

  // ========== FEEDBACK ==========
  async function loadFeedbacks() {
    const container = document.getElementById('feedbackList');
    if (!window.db) {
      container.innerHTML = '<div class="empty-state">💬 Mode démo</div>';
      return;
    }
    
    try {
      const q = query(collection(db, 'feedbacks'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      const feedbacks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      if (!feedbacks.length) {
        container.innerHTML = '<div class="empty-state">🌸 Aucun feedback</div>';
        return;
      }
      
      const moodEmoji = { happy: '😊', love: '😍', neutral: '😐', sad: '😢' };
      container.innerHTML = feedbacks.map(f => `
        <div class="feedback-card">
          <div class="feedback-card-header">
            <span class="feedback-mood-emoji">${moodEmoji[f.mood] || '😊'}</span>
            <div><strong>${formatDateFr(f.date)}</strong><br><small>${new Date(f.createdAt).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</small></div>
            <button class="btn-sm btn-decline" style="margin-left:auto;" onclick="deleteFeedback('${f.id}')">🗑️</button>
          </div>
          <div class="feedback-text">${f.text || '<em>Aucun commentaire</em>'}</div>
        </div>
      `).join('');
    } catch(e) {
      console.error(e);
      container.innerHTML = '<div class="empty-state">😔 Erreur</div>';
    }
  }

  async function deleteFeedback(id) {
    if (!confirm('Supprimer ce feedback ?')) return;
    if (!window.db) return;
    try {
      await deleteDoc(doc(db, 'feedbacks', id));
      await loadFeedbacks();
      showToast('Feedback supprimé', 'success');
    } catch(e) {
      showToast('Erreur', 'error');
    }
  }

  // Exposer les fonctions
  window.login = login;
  window.logout = logout;
  window.updateRequest = updateRequest;
  window.adminSendMessage = adminSendMessage;
  window.deleteFeedback = deleteFeedback;
  
  // Attendre que Firebase soit prêt
  setTimeout(() => {
    if (window.db) {
      loadFeedbacks();
      setInterval(() => { if (document.getElementById('adminScreen').style.display !== 'none') loadChat(); }, 10000);
    }
  }, 1000);
</script>
</body>
</html>
