<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Date avec mon amour ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #f2a7b8;
    --rose-deep: #d4688a;
    --rose-light: #fce8ef;
    --rose-pale: #fff5f8;
    --blush: #f7d6e0;
    --cream: #fdf8f5;
    --mauve: #c9a0b0;
    --text: #3d2535;
    --text-soft: #8a6070;
    --text-muted: #c4a8b4;
    --white: #ffffff;
    --shadow: rgba(180, 100, 130, 0.12);
    --green: #5aac6e;
    --green-light: #edf7f0;
    --red: #c45050;
    --red-light: #fdeaea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--rose-pale) 0%, var(--blush) 100%);
    padding: 2rem;
  }
  .login-box {
    background: white;
    border-radius: 24px;
    padding: 2.5rem;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(180, 100, 130, 0.15);
    text-align: center;
  }
  .login-box h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    margin: 0.75rem 0 0.5rem;
  }
  .login-box h1 span { color: var(--rose-deep); font-style: italic; }
  .login-box p { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 2rem; }
  .login-emoji { font-size: 2.5rem; }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1.5px solid var(--blush);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: var(--rose-pale);
    outline: none;
    text-align: left;
    letter-spacing: normal;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  input[type="password"] { text-align: center; letter-spacing: 0.2em; }
  input[type="email"]:focus,
  input[type="password"]:focus { border-color: var(--rose-deep); background: white; }

  .btn-primary {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--rose-deep), #c45580);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(212,104,138,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,104,138,0.4); }

  .login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; display: none; }

  /* ADMIN LAYOUT */
  #adminScreen { display: none; }

  .admin-header {
    background: white;
    border-bottom: 1px solid var(--blush);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .admin-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--text);
  }
  .admin-header h1 span { color: var(--rose-deep); font-style: italic; }
  .logout-btn {
    background: transparent;
    border: 1px solid var(--blush);
    padding: 0.4rem 0.9rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { background: var(--rose-pale); }

  .admin-body { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: white;
    border-radius: 16px;
    padding: 1.25rem;
    text-align: center;
    box-shadow: 0 2px 12px var(--shadow);
    border: 1px solid rgba(242,167,184,0.2);
  }
  .stat-num { font-size: 2rem; font-weight: 300; color: var(--rose-deep); }
  .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }

  /* SECTION TITLES */
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--blush);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* REQUEST CARDS */
  .request-card {
    background: white;
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 0.75rem;
    box-shadow: 0 2px 12px var(--shadow);
    border: 1px solid rgba(242,167,184,0.15);
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }
  .req-icon { font-size: 1.75rem; flex-shrink: 0; }
  .req-body { flex: 1; }
  .req-title { font-size: 0.95rem; font-weight: 500; color: var(--text); }
  .req-meta { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.25rem; }
  .req-note {
    background: var(--rose-pale);
    border-left: 3px solid var(--rose);
    padding: 0.5rem 0.75rem;
    border-radius: 0 8px 8px 0;
    font-size: 0.85rem;
    color: var(--text-soft);
    font-style: italic;
    margin-top: 0.5rem;
  }
  .req-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }

  .btn-sm {
    padding: 0.4rem 0.9rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-weight: 500;
  }
  .btn-accept { background: var(--green-light); color: var(--green); }
  .btn-accept:hover { background: #d2f0da; }
  .btn-decline { background: var(--red-light); color: var(--red); }
  .btn-decline:hover { background: #fad5d5; }
  .btn-block { background: var(--rose-light); color: var(--rose-deep); }
  .btn-block:hover { background: var(--blush); }

  /* STATUS BADGES */
  .badge {
    display: inline-block;
    padding: 0.2rem 0.65rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .badge-pending { background: #fff8e1; color: #b08000; }
  .badge-accepted { background: var(--green-light); color: var(--green); }
  .badge-declined { background: var(--red-light); color: var(--red); }

  /* CALENDAR ADMIN */
  .admin-cal-wrap {
    background: white;
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: 0 2px 12px var(--shadow);
    margin-bottom: 2rem;
  }
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .cal-nav button {
    background: var(--rose-pale);
    border: 1px solid var(--blush);
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--rose-deep);
  }
  .cal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    text-transform: capitalize;
  }
  .admin-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
  .acal-label { font-size: 0.72rem; color: var(--text-muted); padding: 4px; }
  .acal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    border: 1px solid transparent;
  }
  .acal-day.empty { cursor: default; }
  .acal-day.weekday { color: var(--text-muted); cursor: default; }
  .acal-day.weekend { background: var(--rose-pale); border-color: var(--blush); }
  .acal-day.weekend:hover { background: var(--rose-light); border-color: var(--rose); }
  .acal-day.unavailable { background: #fdeaea !important; border-color: #f5a0a0 !important; color: var(--red) !important; }
  .acal-day.has-request { background: var(--rose-light); border-color: var(--rose-deep); }
  .acal-day .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--rose-deep); position: absolute; bottom: 4px; }

  /* BLOCK DATE FORM */
  .block-form {
    background: var(--rose-pale);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 1rem;
    border: 1px solid var(--blush);
  }
  .block-form label { font-size: 0.85rem; color: var(--text-soft); margin-bottom: 0.4rem; display: block; }
  .block-form input[type="date"] {
    width: 100%;
    padding: 0.65rem 0.9rem;
    border: 1px solid var(--blush);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    background: white;
    color: var(--text);
    outline: none;
    margin-bottom: 0.75rem;
  }
  .block-form input:focus { border-color: var(--rose-deep); }
  .form-row { display: flex; gap: 0.65rem; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 2.5rem;
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 0.75rem; }

  .mb2 { margin-bottom: 2rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text);
    color: white;
    padding: 0.9rem 1.75rem;
    border-radius: 14px;
    font-size: 0.9rem;
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #3d7d5a; }
  .toast.error { background: #b04040; }
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-emoji">🔐</div>
    <h1>Espace <span>Admin</span></h1>
    <p>Accès réservé à mon amour secret</p>

    <input
      type="email"
      id="emailInput"
      placeholder="ton@email.com"
      style="text-align:left; letter-spacing:normal;"
    >
    <input
      type="password"
      id="passwordInput"
      placeholder="••••••••"
      onkeydown="if(event.key==='Enter') login()"
    >
    <button class="btn-primary" id="loginBtn" onclick="login()">
      Entrer ❤️
    </button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ═══════════════════ ADMIN SCREEN ═══════════════════ -->
<div id="adminScreen">
  <div class="admin-header">
    <h1>Admin — <span>mes propositions</span> 💌</h1>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:0.82rem;color:var(--text-muted);">
        Connecté : <strong id="adminEmail"></strong>
      </span>
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="admin-body">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="statMeals">0</div>
        <div class="stat-label">Propositions repas</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statPlanning">0</div>
        <div class="stat-label">Moments réservés</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statActivities">0</div>
        <div class="stat-label">Idées d'activités</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statPending">0</div>
        <div class="stat-label">En attente</div>
      </div>
    </div>

    <!-- CALENDAR -->
    <div class="section-title">📅 Calendrier global</div>
    <div class="admin-cal-wrap">
      <div class="cal-nav">
        <button onclick="prevAdminMonth()">‹</button>
        <div class="cal-title" id="adminCalMonth"></div>
        <button onclick="nextAdminMonth()">›</button>
      </div>
      <div class="admin-cal-grid" id="adminCalGrid"></div>

      <!-- Block date form -->
      <div class="block-form">
        <label>Bloquer / débloquer une date</label>
        <input type="date" id="blockDateInput">
        <div class="form-row">
          <button class="btn-sm btn-block" onclick="blockDate()" style="flex:1;padding:0.6rem">
            🚫 Marquer indisponible
          </button>
          <button class="btn-sm btn-accept" onclick="unblockDate()" style="flex:1;padding:0.6rem">
            ✅ Marquer disponible
          </button>
        </div>
      </div>
    </div>

    <!-- MEAL REQUESTS -->
    <div class="section-title mb2" id="mealSection">🍽️ Propositions repas</div>
    <div id="mealList"></div>

    <!-- PLANNING REQUESTS -->
    <div class="section-title mb2" id="planningSection" style="margin-top:1.5rem">💕 Moments câlins</div>
    <div id="planningList"></div>

    <!-- ACTIVITY REQUESTS -->
    <div class="section-title mb2" id="activitySection" style="margin-top:1.5rem">✨ Idées d'activités</div>
    <div id="activityList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, addDoc, getDocs,
  doc, updateDoc, deleteDoc, query, orderBy, where
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// ╔══════════════════════════════════════════════════╗
// ║  🔧 CONFIGURATION FIREBASE                       ║
// ╚══════════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey: "AIzaSyB-GZDMMGGCsoxAgVHBuWG0Z9UGsVVx4x8",
  authDomain: "date-schedule-app.firebaseapp.com",
  projectId: "date-schedule-app",
  storageBucket: "date-schedule-app.firebasestorage.app",
  messagingSenderId: "340648368652",
  appId: "1:340648368652:web:e96efe6100d45a39846c29"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ══════════════════════════════════════════════
//  FONCTIONS UTILITAIRES (inline — plus besoin de admin.utils.js)
// ══════════════════════════════════════════════
function validateLoginForm({ email, password }) {
  if (!email || email.trim() === '') return 'Email requis';
  if (!email.includes('@')) return 'Email invalide';
  if (!password || password.trim() === '') return 'Mot de passe requis';
  if (password.length < 6) return 'Mot de passe trop court (min. 6 caractères)';
  return null;
}

function getAuthErrorMessage(errorCode) {
  const messages = {
    'auth/user-not-found':         'Aucun compte avec cet email 😕',
    'auth/wrong-password':         'Mot de passe incorrect 😕',
    'auth/invalid-email':          'Email invalide',
    'auth/too-many-requests':      'Trop de tentatives, réessaie plus tard',
    'auth/network-request-failed': 'Problème de connexion réseau',
    'auth/invalid-credential':     'Email ou mot de passe incorrect 😕',
  };
  return messages[errorCode] ?? 'Une erreur est survenue, réessaie';
}

// ══════════════════════════════════════════════
//  AUTH — LOGIN / LOGOUT
// ══════════════════════════════════════════════
window.login = async function() {
  const email = document.getElementById('emailInput').value.trim();
  const pw    = document.getElementById('passwordInput').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginError');

  const formError = validateLoginForm({ email, password: pw });
  if (formError) {
    err.textContent = formError;
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Connexion…';
  err.style.display = 'none';

  try {
    await signInWithEmailAndPassword(auth, email, pw);
    // onAuthStateChanged prend le relais automatiquement
  } catch (e) {
    err.textContent = getAuthErrorMessage(e.code);
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrer ❤️';
  }
};

window.logout = async function() {
  await signOut(auth);
  // onAuthStateChanged remet le login automatiquement
};

// ══════════════════════════════════════════════
//  SURVEILLE L'ÉTAT DE CONNEXION
// ══════════════════════════════════════════════
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    document.getElementById('adminEmail').textContent = user.email;
    window._db = db;
    window._fb = { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, where };
    if (typeof initAdmin === 'function') initAdmin();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').style.display = 'none';
  }
});
</script>

<script>

// ══════════════════════════════════════════════
//  ADMIN CALENDAR
// ══════════════════════════════════════════════
let adminDate = new Date();
let adminUnavailable = [];
let adminBooked = [];
let adminRequests = { meals: [], planning: [], activities: [] };

function prevAdminMonth() { adminDate = new Date(adminDate.getFullYear(), adminDate.getMonth() - 1, 1); buildAdminCalendar(); }
function nextAdminMonth() { adminDate = new Date(adminDate.getFullYear(), adminDate.getMonth() + 1, 1); buildAdminCalendar(); }

function buildAdminCalendar() {
  const year = adminDate.getFullYear();
  const month = adminDate.getMonth();
  document.getElementById('adminCalMonth').textContent =
    adminDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

  const HOLIDAYS = ['01-01','04-01','05-01','05-08','05-09','05-20','07-14','08-15','11-01','11-11','12-25'];
  const labels = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  let html = labels.map(l => `<div class="acal-label">${l}</div>`).join('');

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const offset = (firstDay + 6) % 7;

  for (let i = 0; i < offset; i++) html += '<div class="acal-day empty"></div>';

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const dow = date.getDay();
    const dateStr = formatDate(date);
    const isWeekend = dow === 0 || dow === 6;
    const isHoliday = HOLIDAYS.includes(`${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`);
    const isUnavail = adminUnavailable.includes(dateStr);
    const hasReq = adminBooked.includes(dateStr);

    let cls = 'acal-day';
    if (!isWeekend && !isHoliday) cls += ' weekday';
    else cls += ' weekend';
    if (isUnavail) cls += ' unavailable';
    if (hasReq) cls += ' has-request';

    const dot = hasReq ? '<div class="dot"></div>' : '';
    html += `<div class="${cls}" onclick="adminDayClick('${dateStr}')">${day}${dot}</div>`;
  }

  document.getElementById('adminCalGrid').innerHTML = html;
}

function adminDayClick(dateStr) {
  document.getElementById('blockDateInput').value = dateStr;
}

async function blockDate() {
  const date = document.getElementById('blockDateInput').value;
  if (!date) { showToast('Choisis une date', 'error'); return; }

  try {
    if (window._db) {
      const { collection, addDoc } = window._fb;
      await addDoc(collection(window._db, 'unavailableDates'), { date, createdAt: new Date().toISOString() });
    }
    if (!adminUnavailable.includes(date)) adminUnavailable.push(date);
    buildAdminCalendar();
    showToast(`${formatDateFr(date)} marqué indisponible 🚫`, 'success');
  } catch(e) { showToast('Erreur', 'error'); }
}

async function unblockDate() {
  const date = document.getElementById('blockDateInput').value;
  if (!date) { showToast('Choisis une date', 'error'); return; }

  try {
    if (window._db) {
      const { collection, getDocs, query, where, doc, deleteDoc } = window._fb;
      const q = query(collection(window._db, 'unavailableDates'), where('date', '==', date));
      const snap = await getDocs(q);
      snap.forEach(d => deleteDoc(doc(window._db, 'unavailableDates', d.id)));
    }
    adminUnavailable = adminUnavailable.filter(d => d !== date);
    buildAdminCalendar();
    showToast(`${formatDateFr(date)} est maintenant disponible ✅`, 'success');
  } catch(e) { showToast('Erreur', 'error'); }
}

// ══════════════════════════════════════════════
//  LOAD ALL DATA
// ══════════════════════════════════════════════
async function initAdmin() {
  buildAdminCalendar();
  if (!window._db) {
    loadDemoData();
    return;
  }
  await loadAllRequests();
}

async function loadAllRequests() {
  const { collection, getDocs, query, orderBy } = window._fb;
  const db = window._db;

  try {
    // Unavailable
    const uSnap = await getDocs(collection(db, 'unavailableDates'));
    adminUnavailable = uSnap.docs.map(d => d.data().date);

    // Meal requests
    const mSnap = await getDocs(query(collection(db, 'mealRequests'), orderBy('createdAt', 'desc')));
    adminRequests.meals = mSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Planning requests
    const pSnap = await getDocs(query(collection(db, 'planningRequests'), orderBy('createdAt', 'desc')));
    adminRequests.planning = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    adminBooked = adminRequests.planning.filter(r => r.status !== 'declined').map(r => r.date);

    // Activity requests
    const aSnap = await getDocs(query(collection(db, 'activityRequests'), orderBy('createdAt', 'desc')));
    adminRequests.activities = aSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    renderAll();
    buildAdminCalendar();
  } catch(e) { console.error(e); showToast('Erreur chargement', 'error'); }
}

// ══════════════════════════════════════════════
//  RENDER FUNCTIONS
// ══════════════════════════════════════════════
function renderMeals() {
  const list = document.getElementById('mealList');
  if (!adminRequests.meals.length) {
    list.innerHTML = '<div class="empty-state"><div class="big">🍽️</div><p>Aucune proposition de repas pour l\'instant</p></div>';
    return;
  }
  list.innerHTML = adminRequests.meals.map(r => `
    <div class="request-card">
      <div class="req-icon">🍽️</div>
      <div class="req-body">
        <div class="req-title">${r.food} · ${r.slot === 'midi' ? '🌞 Déjeuner' : '🌙 Dîner'}</div>
        <div class="req-meta">${formatDateFr(r.date)} · <span class="badge badge-${r.status}">${statusLabel(r.status)}</span></div>
        ${r.note ? `<div class="req-note">"${r.note}"</div>` : ''}
        <div class="req-actions">
          ${r.status === 'pending' ? `
            <button class="btn-sm btn-accept" onclick="updateStatus('mealRequests','${r.id}','accepted','meals')">✅ Accepter</button>
            <button class="btn-sm btn-decline" onclick="updateStatus('mealRequests','${r.id}','declined','meals')">❌ Refuser</button>
          ` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function renderPlanning() {

        <div class="req-actions">

            <button class="btn-sm btn-accept" onclick="updateStatus('planningRequests','${r.id}','accepted','planning')">✅ Confirmer</button>

function updateStats() {
  const allReqs = [...adminRequests.meals, ...adminRequests.planning, ...adminRequests.activities];
  document.getElementById('statMeals').textContent = adminRequests.meals.length;
  document.getElementById('statPlanning').textContent = adminRequests.planning.length;
  document.getElementById('statActivities').textContent = adminRequests.activities.length;
  document.getElementById('statPending').textContent = allReqs.filter(r => r.status === 'pending').length;
}

// ══════════════════════════════════════════════
//  UPDATE STATUS
// ══════════════════════════════════════════════
async function updateStatus(collectionName, id, status, localKey) {
  try {
    if (window._db) {
      const { doc, updateDoc } = window._fb;
      await updateDoc(doc(window._db, collectionName, id), { status });
    }
    const req = adminRequests[localKey].find(r => r.id === id);
    if (req) req.status = status;
    renderAll();
    showToast(status === 'accepted' ? '✅ Accepté avec amour ❤️' : '❌ Refusé', status === 'accepted' ? 'success' : '');
  } catch(e) { showToast('Erreur', 'error'); }
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateFr(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function statusLabel(s) {
  return { pending: '⏳ En attente', accepted: '✅ Accepté', declined: '❌ Refusé' }[s] || s;
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
